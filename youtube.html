<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube | Developers Uncopylocked</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { background:#020202; color:white; font-family:'Inter',sans-serif; }

        .glass {
            background: rgba(255,255,255,0.02);
            backdrop-filter: blur(16px);
            border:1px solid rgba(255,255,255,0.08);
        }

        .cyber-card {
            transition:0.4s;
        }

        .cyber-card:hover {
            transform:translateY(-8px);
            background:rgba(255,255,255,0.05);
        }

        .text-gradient {
            background: linear-gradient(to right,#3b82f6,#a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .yt-glow:hover {
            box-shadow:0 0 60px rgba(255,0,0,0.25);
        }
    </style>
</head>

<body class="px-6 py-10">

<!-- NAV -->
<div class="max-w-6xl mx-auto flex justify-between items-center mb-12">
    <a href="index.html" class="glass px-6 py-2 rounded-full text-xs font-bold flex items-center gap-2 hover:bg-white/10 transition">
        <i class="fas fa-arrow-left"></i> BACK
    </a>

    <img src="https://i.ibb.co/shy95Fh/logo.png" class="w-10 h-10 rounded-xl">
</div>

<!-- HERO -->
<section class="text-center mb-20 animate__animated animate__fadeInUp">
    <img src="https://yt3.googleusercontent.com/ytc/YOUR_LOGO"
         class="w-32 h-32 mx-auto rounded-3xl border border-red-500/30 mb-6">

    <h1 class="text-5xl font-black mb-4">
        DU <span class="text-gradient">YouTube</span>
    </h1>

    <p class="text-gray-400 max-w-xl mx-auto mb-8">
        Roblox systems, scripts, UI kits, and dev tutorials.
        Build smarter. Learn faster.
    </p>

    <a href="https://www.youtube.com/@DevelopersUncopylocked"
       target="_blank"
       class="bg-red-600 hover:bg-red-500 px-8 py-4 rounded-xl font-black flex items-center gap-2 justify-center w-fit mx-auto transition shadow-lg shadow-red-600/20">
        <i class="fab fa-youtube"></i> SUBSCRIBE
    </a>
</section>

<!-- FEATURED VIDEO -->
<section class="max-w-5xl mx-auto mb-20 animate__animated animate__fadeInUp">
    <div class="glass p-6 rounded-[2rem] yt-glow">
        <div class="aspect-video rounded-xl overflow-hidden">
            <iframe class="w-full h-full"
                src="https://www.youtube.com/embed/YOUR_VIDEO_ID"
                frameborder="0" allowfullscreen>
            </iframe>
        </div>
    </div>
</section>

<!-- VIDEO GRID -->
<section class="max-w-6xl mx-auto">
    <h2 class="text-center text-[10px] tracking-[0.4em] text-gray-500 mb-12 uppercase">
        Latest Uploads
    </h2>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">

        <!-- VIDEO CARD -->
        <div class="glass cyber-card rounded-2xl overflow-hidden">
            <iframe class="w-full h-48"
                src="https://www.youtube.com/embed/VIDEO_ID_1"
                frameborder="0"></iframe>

            <div class="p-4">
                <h3 class="font-bold text-sm">Video Title 1</h3>
                <p class="text-gray-400 text-xs mt-1">Short description</p>
            </div>
        </div>

        <div class="glass cyber-card rounded-2xl overflow-hidden">
            <iframe class="w-full h-48"
                src="https://www.youtube.com/embed/VIDEO_ID_2"
                frameborder="0"></iframe>

            <div class="p-4">
                <h3 class="font-bold text-sm">Video Title 2</h3>
                <p class="text-gray-400 text-xs mt-1">Short description</p>
            </div>
        </div>

        <div class="glass cyber-card rounded-2xl overflow-hidden">
            <iframe class="w-full h-48"
                src="https://www.youtube.com/embed/VIDEO_ID_3"
                frameborder="0"></iframe>

            <div class="p-4">
                <h3 class="font-bold text-sm">Video Title 3</h3>
                <p class="text-gray-400 text-xs mt-1">Short description</p>
            </div>
        </div>

    </div>
</section>

<!-- CTA -->
<section class="text-center mt-24">
    <h3 class="text-2xl font-black mb-4">Don’t Miss Updates</h3>
    <p class="text-gray-400 mb-6 text-sm">Subscribe for exclusive dev drops</p>

    <a href="https://www.youtube.com/@DevelopersUncopylocked"
       class="bg-red-600 hover:bg-red-500 px-8 py-3 rounded-xl font-black transition">
       Subscribe Now
    </a>
</section>

</body>
</html>
